name: costco_card_preview
description: "Device-free preview: parse a bundled fixture and render the result card. Runs on web/desktop (no ML Kit)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  # The parser core, as a local path dependency. No OCR plugin → builds anywhere.
  costco_price_tag_parser:
    path: ../../packages/dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_ocr.json
