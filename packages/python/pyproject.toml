[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "costco-price-tag-parser"
version = "0.1.0"
description = "Heuristic parser for Costco A-format price tags. Pure Python, OCR-engine-agnostic."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Seungsoo Baek" }]
keywords = ["costco", "ocr", "price-tag", "parser"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/S-Soo100/costco-price-tag-parser"
Repository = "https://github.com/S-Soo100/costco-price-tag-parser"
Issues = "https://github.com/S-Soo100/costco-price-tag-parser/issues"

[project.optional-dependencies]
dev = ["pytest>=8", "mypy>=1.8", "ruff>=0.5", "jsonschema>=4.18"]

[tool.hatch.build.targets.wheel]
packages = ["src/costco_price_tag_parser"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
